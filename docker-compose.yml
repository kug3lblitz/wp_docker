services:
   db:
     image: mariadb:latest
     volumes:
       - db_data:/var/lib/mysql
     ports:
       - "3306:3306"
     restart: always
     environment:
       MYSQL_ROOT_PASSWORD: someclassicpress
       MYSQL_DATABASE: classicpress
       MYSQL_USER: classicpress
       MYSQL_PASSWORD: classicpress
     healthcheck:
       test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
       interval: 10s
       timeout: 5s
       retries: 5

   classicpress:
     depends_on:
       db:
         condition: service_healthy
     build: .
     volumes:
       - ./wp_data:/var/www/html
     ports:
       - "8000:80"
     restart: always
     environment:
       WORDPRESS_DB_HOST: db
       WORDPRESS_DB_USER: classicpress
       WORDPRESS_DB_PASSWORD: classicpress
       WORDPRESS_DB_NAME: classicpress

volumes:
    wp_data: {}
    db_data: {}